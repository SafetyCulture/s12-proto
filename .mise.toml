[tools]
go = "1.26"
buf = "1.68.4"
golangci-lint = "2.11.4"
"go:google.golang.org/protobuf/cmd/protoc-gen-go" = "latest"

[tasks.generate]
description = "Generate Go code from proto definitions"
run = "make generate"

[tasks.test]
description = "Run tests (root module)"
run = "go test ./..."

[tasks.lint]
description = "Run Go linter"
run = "golangci-lint run"

[tasks."lint:proto"]
description = "Lint proto files with buf"
run = "buf lint"
