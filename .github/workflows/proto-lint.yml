name: Proto Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  buf:
    name: Buf Lint & Breaking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - name: Lint
        run: mise run lint:proto

      - name: Breaking change detection
        if: github.event_name == 'pull_request'
        run: buf breaking --against ".git#branch=${GITHUB_BASE_REF}"
