name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2

      - name: Build root module plugin binaries
        run: |
          mkdir -p dist
          PLUGINS=(
            protoc-gen-govalidator
            protoc-gen-logger
            protoc-gen-s12perm
            protoc-gen-gogrpcmock
          )
          TARGETS=(linux/amd64 linux/arm64 darwin/amd64 darwin/arm64)
          for plugin in "${PLUGINS[@]}"; do
            for target in "${TARGETS[@]}"; do
              GOOS="${target%/*}"
              GOARCH="${target#*/}"
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build \
                -o "dist/${plugin}_${GOOS}_${GOARCH}" \
                "./protobuf/${plugin}"
            done
          done

      - name: Build protoc-gen-cruxclient-go binaries
        working-directory: protobuf/protoc-gen-cruxclient-go
        run: |
          TARGETS=(linux/amd64 linux/arm64 darwin/amd64 darwin/arm64)
          for target in "${TARGETS[@]}"; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build \
              -o "../../dist/protoc-gen-cruxclient-go_${GOOS}_${GOARCH}" .
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
